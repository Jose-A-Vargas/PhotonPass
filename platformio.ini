; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; Shared settings — inherited by all named environments below.
[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

build_flags =
    ; Native USB — HID keyboard + CDC serial
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MSC_ON_BOOT=0
    -D ARDUINO_USB_DFU_ON_BOOT=0
    ; PSRAM — required on the Plus variant (8 MB OPI PSRAM)
    -D BOARD_HAS_PSRAM

board_build.filesystem = littlefs
board_build.partitions = partitions.csv

lib_deps =
    zinggjm/GxEPD2          ; E-Ink panel driver (>= 1.5.0 for GDEY042T81 class)
    adafruit/Adafruit GFX Library
    ricmoo/QRCode            ; QR code generation for password output mode

; Production firmware — full state machine with display + scanner.
[env:seeed_xiao_esp32s3]
upload_port = COM7
monitor_port = COM7

; PassGen interactive CLI — serial terminal, no other modules compiled.
; Build:   pio run -e passgen_test
; Flash:   pio run -e passgen_test --target upload
; Monitor: pio device monitor -e passgen_test
[env:passgen_test]
build_src_filter = -<*> +<passgen.cpp> +<test_passgen.cpp>
monitor_filters = direct

; Vault interactive CLI — serial terminal + HID keyboard output.
; Build:   pio run -e vault_cli
; Flash:   pio run -e vault_cli --target upload
; Monitor: pio device monitor -e vault_cli
[env:vault_cli]
build_src_filter = -<*> +<crypto.cpp> +<vault.cpp> +<passgen.cpp> +<hid.cpp> +<backup.cpp> +<vault_cli.cpp>
build_unflags = -D ARDUINO_USB_MODE
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MSC_ON_BOOT=0
    -D ARDUINO_USB_DFU_ON_BOOT=0
    -D ARDUINO_USB_MODE=0
    -D BOARD_HAS_PSRAM
monitor_filters = direct

; Vault isolated test — exercises serialization / save-load / auth / lock.
; Build:   pio run -e vault_test
; Flash:   pio run -e vault_test --target upload
; Monitor: pio device monitor -e vault_test
[env:vault_test]
build_src_filter = -<*> +<crypto.cpp> +<vault.cpp> +<test_vault.cpp>
monitor_filters = direct

; Hardware-free test suite — exercises crypto / vault / passgen / sync / backup / HID.
; Build:   pio run -e test
; Flash:   pio run -e test --target upload
; Monitor: pio device monitor -e test
[env:test]
build_src_filter = +<*> -<main.cpp> -<display.cpp> -<test_passgen.cpp> -<test_vault.cpp>
build_unflags = -D ARDUINO_USB_MODE
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MSC_ON_BOOT=0
    -D ARDUINO_USB_DFU_ON_BOOT=0
    -D ARDUINO_USB_MODE=0         ; TinyUSB (OTG) — required for CDC + HID composite
    -D BOARD_HAS_PSRAM
    -D PIN_SCAN_BTN=D10
